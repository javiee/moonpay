---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: flux-system
spec:
  install:
    createNamespace: true
  interval: 10m
  chart:
    spec:
      chart: ./charts/postgres
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  values:
    image:
      repository: postgres
      tag: "17-alpine"
    postgres:
      user: postgres
      password: postgres
      db: currencies
    storage:
      persistent: false
      size: 1Gi
    service:
      port: 5432
