name: moonpay app build

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths:
      - 'moonpay-app/**'

env:
  PROJECT: moonpay-app
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/moonpay-app
  DEVELOP_BRANCH: develop

jobs:
  app-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./moonpay-app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: moonpay-app/pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install

      - name: Build App
        run: pnpm build

      - name: Run Tests
        run: pnpm test --if-present

  create-tag:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: app-build
    outputs:
      tag: ${{ steps.create-tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Image Tag
        id: create-tag
        run: |
          if [ "${{ github.ref }}" == "refs/heads/${{ env.DEVELOP_BRANCH }}" ]; then
            TAG_PREFIX=$(git rev-parse --short HEAD)
            echo "tag=dev-$TAG_PREFIX" >> $GITHUB_OUTPUT

          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            git fetch --tags
            last_tag=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null)

            if [ -z "$last_tag" ]; then
              new_tag="v1.0.0"
            else
              major=$(echo ${last_tag//v} | cut -d. -f1)
              minor=$(echo ${last_tag//v} | cut -d. -f2)
              patch=$(echo ${last_tag//v} | cut -d. -f3)

              commit_message=$(git log -1 HEAD --pretty=format:%s)

              if [[ $commit_message == *"BREAKING"* ]]; then
                ((major+=1)); minor=0; patch=0
              elif [[ $commit_message == *"FEATURE"* ]]; then
                ((minor+=1)); patch=0
              else
                ((patch+=1))
              fi

              new_tag="v$major.$minor.$patch"
            fi

            echo "tag=$new_tag" >> $GITHUB_OUTPUT
            git tag $new_tag
            git push origin $new_tag

          else
            echo "Unable to determine tag"
            exit 1
          fi

  ghcr-publish:
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: create-tag
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_TAG: ${{ needs.create-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -f ./moonpay-app/docker/Dockerfile -t $IMAGE_NAME:$IMAGE_TAG ./moonpay-app

      - name: Push Docker image
        run: docker push $IMAGE_NAME:$IMAGE_TAG